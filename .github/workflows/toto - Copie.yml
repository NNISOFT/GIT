name: Dependency example 4 jobs

on:
  push:
    branches: [ BranchePull ]

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Etape 1 - Création d'un fichier à télécharger
              run: touch Atelecharger.txt
            - name: Etape 2 - Upload
              uses: actions/upload-artifact@v7
              with:
                name: Atelecharger.txt
                path: ./Atelecharger.txt

    job2:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - name: Etape 1 - Affichage après création
              run: ls -lah
            - name: Etape 2 - Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: Atelecharger.txt
                path: ./Downloads
            - name: Etape 3 - Affichage final
              run: ls -lah

    job3:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - name: Job 3
              run: echo "Job 3"

    job4:
        needs: job3
        runs-on: ubuntu-latest
        steps:
            - name: Job 4
              run: echo "Job 4"